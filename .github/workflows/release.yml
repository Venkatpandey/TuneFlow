name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          SIGNING_STORE_BASE64: ${{ secrets.SIGNING_STORE_BASE64 }}
        run: |
          test -n "$SIGNING_STORE_BASE64" || { echo "SIGNING_STORE_BASE64 is required"; exit 1; }
          echo "$SIGNING_STORE_BASE64" | base64 --decode > release.keystore

      - name: Build signed release artifacts
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          test -n "$SIGNING_STORE_PASSWORD" || { echo "SIGNING_STORE_PASSWORD is required"; exit 1; }
          test -n "$SIGNING_KEY_ALIAS" || { echo "SIGNING_KEY_ALIAS is required"; exit 1; }
          test -n "$SIGNING_KEY_PASSWORD" || { echo "SIGNING_KEY_PASSWORD is required"; exit 1; }
          ./gradlew :app:assembleRelease --stacktrace

      - name: Verify and rename APK
        run: |
          echo "APK outputs:"
          ls -la app/build/outputs/apk/release || true

          APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' ! -name '*-unsigned.apk' | head -n1)"
          test -n "$APK_PATH" || { echo "No APK found"; exit 1; }
          test -f "$APK_PATH" || { echo "APK path is invalid: $APK_PATH"; exit 1; }

          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          test -n "$SDK_ROOT" || { echo "ANDROID_HOME or ANDROID_SDK_ROOT is required"; exit 1; }

          APKSIGNER="$(find "$SDK_ROOT/build-tools" -type f -name apksigner | sort -V | tail -n1)"
          test -n "$APKSIGNER" || { echo "apksigner not found"; exit 1; }

          "$APKSIGNER" verify --print-certs "$APK_PATH"

          cp "$APK_PATH" tuneflow-tv.apk

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" > CHANGELOG.md
          else
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s" > CHANGELOG.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tuneflow-tv.apk
          body_path: CHANGELOG.md
