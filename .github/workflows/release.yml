name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          SIGNING_STORE_BASE64: ${{ secrets.SIGNING_STORE_BASE64 }}
        run: |
          echo "$SIGNING_STORE_BASE64" | base64 --decode > release.keystore

      - name: Build signed release artifacts
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace

      - name: Rename artifacts
        run: |
          echo "APK outputs:"
          ls -la app/build/outputs/apk/release || true
          echo "AAB outputs:"
          ls -la app/build/outputs/bundle/release || true

          APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n1)"
          AAB_PATH="$(find app/build/outputs/bundle/release -maxdepth 1 -type f -name '*.aab' | head -n1)"

          test -n "$APK_PATH" || { echo "No APK found"; exit 1; }
          test -n "$AAB_PATH" || { echo "No AAB found"; exit 1; }

          cp "$APK_PATH" tuneflow-tv-release.apk
          cp "$AAB_PATH" tuneflow-tv.aab

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" > CHANGELOG.md
          else
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s" > CHANGELOG.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tuneflow-tv-release.apk
            tuneflow-tv.aab
          body_path: CHANGELOG.md
