name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          SIGNING_STORE_BASE64: ${{ secrets.SIGNING_STORE_BASE64 }}
        run: |
          echo "$SIGNING_STORE_BASE64" | base64 --decode > release.keystore

      - name: Build signed release artifacts
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace

      - name: Rename artifacts
        run: |
          cp app/build/outputs/apk/release/app-release.apk tuneflow-tv-release.apk
          cp app/build/outputs/bundle/release/app-release.aab tuneflow-tv.aab

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" > CHANGELOG.md
          else
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s" > CHANGELOG.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tuneflow-tv-release.apk
            tuneflow-tv.aab
          body_path: CHANGELOG.md
